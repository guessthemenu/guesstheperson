services:
  - type: web
    name: guesstheperson-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGIN
        sync: false
  - type: static
    name: guesstheperson-frontend
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: true
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_ENVIRONMENT
        value: production